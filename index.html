<!DOCTYPE html>
<html>
<head>
    <title>DWave Designer v15.0 - Drawing & Logic</title>
    <style>
        :root { --sidebar-bg: #1a1a1b; --panel-bg: #2d2d2e; --accent: #3498db; --text: #e0e0e0; }
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: var(--text); overflow: hidden; }
        
        /* 사이드바 설정 */
        .sidebar { width: 380px; padding: 25px; background: var(--sidebar-bg); border-right: 1px solid #333; overflow-y: auto; z-index: 100; }
        .sidebar h2 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        
        .input-group { background: var(--panel-bg); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #444; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #fff; color: #000; font-weight: bold; box-sizing: border-box; margin-bottom: 10px; }
        
        /* 캔버스 영역 */
        .canvas-container { flex: 1; position: relative; background: #222; overflow: auto; display: flex; align-items: flex-start; justify-content: flex-start; padding: 20px; }
        canvas { background: #fff; cursor: crosshair; box-shadow: 0 0 30px rgba(0,0,0,0.5); transform-origin: top left; }
        
        /* 실시간 리포트 패널 */
        .report-panel { position: absolute; top: 20px; right: 20px; width: 320px; background: rgba(255, 255, 255, 0.98); color: #333; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-top: 10px solid var(--accent); }
        .report-panel h3 { margin-top: 0; border-bottom: 1px solid #ddd; padding-bottom: 10px; font-size: 18px; }
        .stat-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
        .val { font-weight: bold; color: #c0392b; font-size: 16px; }
        
        .btn-clear { width: 100%; padding: 12px; background: #e74c3c; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>DWave Sketch</h2>
    
    <div class="input-group">
        <label>1. 도면 파일(JPG/PNG)</label>
        <input type="file" id="loader" accept="image/*">
    </div>

    <div class="input-group">
        <label>2. 실제 스케일 (100px 당 몇 m?)</label>
        <input type="number" id="scale" value="1.0" step="0.1">
        <label>3. 층고 설정 (H)</label>
        <input type="number" id="wallH" value="2.7" step="0.1">
    </div>

    <div class="input-group">
        <h3>시공 변수 설정</h3>
        <label>ALC 시공</label>
        <select id="alc_v">
            <option value="1">싱글 (1회)</option>
            <option value="2" selected>더블 (2회)</option>
            <option value="0">미시공</option>
        </select>
        
        <label>공기층(Air Gap) mm</label>
        <input type="number" id="gap_v" value="50">

        <label>석고보드</label>
        <select id="gyp_v">
            <option value="1">일반석고 1P</option>
            <option value="2" selected>일반석고 2P</option>
            <option value="1.1">차음석고 1P</option>
            <option value="2.2">차음석고 2P</option>
        </select>
    </div>

    <button class="btn-clear" onclick="clearWalls()">그림 초기화</button>
    <p style="font-size:11px; color:#666; margin-top:20px;">* 도면 위에서 마우스 왼쪽 클릭 후 드래그하여 벽체를 그리세요. 그려진 선의 길이에 따라 실시간 물량이 산출됩니다.</p>
</div>

<div class="canvas-container">
    <canvas id="canvas"></canvas>
    
    <div class="report-panel" id="report">
        <h3>실시간 물량 리포트</h3>
        <div id="summary">도면을 올리고 벽을 그리세요.</div>
        <div id="details" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let img = new Image();
    let walls = [];
    let isDrawing = false;
    let startX, startY;

    // 도면 업로드
    document.getElementById('loader').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                redraw();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    canvas.onmousedown = (e) => {
        isDrawing = true;
        startX = e.offsetX;
        startY = e.offsetY;
    };

    canvas.onmousemove = (e) => {
        if (!isDrawing) return;
        redraw();
        drawTempLine(startX, startY, e.offsetX, e.offsetY);
    };

    canvas.onmouseup = (e) => {
        if (!isDrawing) return;
        isDrawing = false;
        const lengthPx = Math.sqrt(Math.pow(e.offsetX - startX, 2) + Math.pow(e.offsetY - startY, 2));
        const mScale = parseFloat(document.getElementById('scale').value);
        const lengthM = (lengthPx / 100) * mScale;

        walls.push({ x1: startX, y1: startY, x2: e.offsetX, y2: e.offsetY, len: lengthM });
        updateCalc();
    };

    function drawTempLine(x1, y1, x2, y2) {
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = '#3498db';
        ctx.lineWidth = 4;
        ctx.stroke();
    }

    function redraw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if(img.src) ctx.drawImage(img, 0, 0);
        walls.forEach(w => {
            ctx.beginPath();
            ctx.moveTo(w.x1, w.y1);
            ctx.lineTo(w.x2, w.y2);
            ctx.strokeStyle = '#27ae60';
            ctx.lineWidth = 6;
            ctx.stroke();
        });
    }

    function clearWalls() {
        walls = [];
        redraw();
        updateCalc();
    }

    function updateCalc() {
        const totalLen = walls.reduce((s, w) => s + w.len, 0);
        const h = parseFloat(document.getElementById('wallH').value);
        const alc = parseInt(document.getElementById('alc_v').value);
        const gap = document.getElementById('gap_v').value;
        const gyp = parseFloat(document.getElementById('gyp_v').value);
        const area = totalLen * h;

        const summary = document.getElementById('summary');
        const details = document.getElementById('details');

        if(totalLen === 0) {
            summary.innerHTML = "도면 위에 벽을 그려주세요.";
            details.innerHTML = "";
            return;
        }

        summary.innerHTML = `
            <div class="stat-row"><span>총 벽체 길이</span><span class="val">${totalLen.toFixed(2)}m</span></div>
            <div class="stat-row"><span>벽체 면적(㎡)</span><span class="val">${area.toFixed(2)}㎡</span></div>
        `;

        // 자재 로직
        const alcQty = alc > 0 ? Math.ceil((area / 0.24) * alc * 1.1) : 0;
        const gypQty = Math.ceil((area / 1.62) * (gyp > 2 ? 2 : gyp) * 1.1); // 단순 겹수 로직
        const studQty = Math.ceil((totalLen / 0.45 + 1) * 1.1);

        details.innerHTML = `
            <div class="stat-row"><span>ALC 블록 (${alc}회)</span><span class="val">${alcQty}장</span></div>
            <div class="stat-row"><span>투바이 (450간격)</span><span class="val">${studQty}본</span></div>
            <div class="stat-row"><span>석고보드 (할증포함)</span><span class="val">${gypQty}매</span></div>
            <div style="font-size:11px; color:#e67e22; margin-top:10px;">* 설정된 공기층(${gap}mm) 기반 공간 분석 완료</div>
        `;
    }
</script>

</body>
</html>
