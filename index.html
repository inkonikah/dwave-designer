<!DOCTYPE html>
<html>
<head>
<title>DWave Designer</title>

<style>

body{
font-family:Arial;
margin:40px;
}

.container{
display:flex;
gap:40px;
}

.left{
width:300px;
}

.right{
flex:1;
border:1px solid #ccc;
height:500px;
padding:20px;
}

input,select{
width:100%;
margin-bottom:10px;
padding:6px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
}

.room{
width:120px;
height:80px;
border:2px solid black;
display:inline-flex;
align-items:center;
justify-content:center;
margin:10px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>DWave Designer</h1>

<div class="container">

<div class="left">

<h3>Studio Plan Upload</h3>
<input type="file">

<h3>Studio Type</h3>

<select>
<option>Post Production Studio</option>
<option>Recording Studio</option>
<option>Mixing Stage</option>
<option>Color Grading Suite</option>
</select>

<h3>Room Configuration</h3>

ADR Room
<input type="number" value="1">

Mixing Room
<input type="number" value="1">

Editing Room
<input type="number" value="2">

Office
<input type="number" value="1">

Machine Room
<input type="number" value="1">

<button id="generate">Generate Layout</button>

</div>

<div class="right" id="layout">
2D Layout will appear here
</div>

</div>

<script>

document.getElementById("generate").onclick=function(){

const inputs=document.querySelectorAll("input[type=number]")

const adr=inputs[0].value
const mix=inputs[1].value
const edit=inputs[2].value
const office=inputs[3].value
const machine=inputs[4].value

const layout=document.getElementById("layout")

layout.innerHTML=""

function room(name){

const div=document.createElement("div")
div.className="room"
div.innerText=name

layout.appendChild(div)

}

for(let i=0;i<adr;i++) room("ADR")
for(let i=0;i<mix;i++) room("MIX")
for(let i=0;i<edit;i++) room("EDIT")
for(let i=0;i<office;i++) room("OFFICE")
for(let i=0;i<machine;i++) room("MACHINE")

}

</script>

</body>
</html>
