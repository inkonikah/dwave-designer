<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자재 산출 특화 프리드로잉 툴</title>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; background-color: #e9ecef; }
        #sidebar { width: 360px; background: #fff; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 10; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; cursor: crosshair; background-color: #f8f9fa; }
        canvas { display: block; }
        canvas.grid-bg { 
            background-image: linear-gradient(#e0e0e0 1px, transparent 1px), linear-gradient(90deg, #e0e0e0 1px, transparent 1px); 
            background-size: 20px 20px; 
        }
        h2, h3 { margin: 0; font-size: 16px; color: #333; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 13px; font-weight: bold; color: #495057; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid #ced4da; border-radius: 4px; font-size: 13px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 5px; }
        button { padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 13px; }
        button:hover { background-color: #0056b3; }
        button.active { background-color: #dc3545; }
        button.success { background-color: #28a745; }
        button.success:hover { background-color: #218838; }
        button.secondary { background-color: #6c757d; }
        button.secondary:hover { background-color: #5a6268; }
        .btn-row { display: flex; gap: 5px; }
        .btn-row button { flex: 1; padding: 8px 5px; font-size: 12px;}
        .result-box { background: #f1f3f5; padding: 15px; border-radius: 6px; border: 1px solid #dee2e6; font-size: 14px; line-height: 1.6; color: #212529; }
        hr { border: 0; border-top: 1px solid #dee2e6; margin: 5px 0; }
        .shortcut-info { font-size: 12px; color: #495057; background: #e9ecef; padding: 10px; border-radius: 4px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>📏 자재 산출 프리드로잉 툴</h2>
    
    <div class="form-group">
        <label>1. 도면 불러오기 (선택)</label>
        <input type="file" id="imageLoader" accept="image/*">
    </div>

    <div class="form-group">
        <button id="btnCalibrate">2. 척도 설정 (실제 길이 지정)</button>
        <span id="scaleStatus" style="font-size: 12px; color: #dc3545; font-weight: bold;">척도 미설정 (임시: 1px = 10mm)</span>
    </div>

    <hr>

    <div class="form-group">
        <label>3. 벽체 그리기 (다중 객체 지원)</label>
        <div class="btn-row">
            <button id="btnDraw" style="font-size: 13px; padding: 10px;">선 그리기</button>
            <button id="btnFinish" class="success" style="font-size: 13px; padding: 10px;">현재 선 완료</button>
        </div>
        <div class="btn-row" style="margin-top: 5px;">
            <button id="btnUndo" class="secondary">되돌리기</button>
            <button id="btnFit" class="secondary" style="background-color: #17a2b8;">도면 찾기🔍</button>
            <button id="btnClear" class="secondary">전체 초기화</button>
        </div>
    </div>

    <hr>
    <h3>📦 자재 물량 세팅</h3>
    <div class="form-group">
        <label>벽 높이 (mm)</label>
        <input type="number" id="wallHeight" value="2400" step="100">
    </div>

    <div class="form-group">
        <label>기본 골조 (뼈대)</label>
        <select id="baseWallType">
            <option value="none">없음 (기존 벽체 활용)</option>
            <option value="alc75">ALC 블록 75T</option>
            <option value="alc100">ALC 블록 100T</option>
            <option value="stud">목상 (투바이포 2x4)</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>마감재 및 충진재 선택</label>
        <div class="checkbox-group">
            <input type="checkbox" id="chkGypsum95" checked> <label for="chkGypsum95">일반 석고 9.5T (3x6)</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="chkGypsum125"> <label for="chkGypsum125">차음 석고 12.5T (3x6)</label>
        </div>
        <div class="checkbox-group" style="margin-top: 5px;">
            <select id="insulationType">
                <option value="none">충진재 없음</option>
                <option value="glasswool">글라스울 (450x1000)</option>
                <option value="rockwool">락울 (450x1000)</option>
            </select>
        </div>
    </div>

    <hr>
    <h3>📊 전체 물량 합산 결과</h3>
    <div id="results" class="result-box">
        선을 그리고 완료를 눌러주세요.
    </div>

    <div class="shortcut-info">
        <strong>[조작 단축키]</strong><br>
        • 화면 이동: <b>H 키 누르고 마우스 드래그</b><br>
        • 확대/축소: <b>마우스 휠</b><br>
        • 직교 선긋기: <b>Shift 키 누르고 클릭</b><br>
        • 실행 취소: <b>Ctrl + Z</b>
    </div>
</div>

<div id="canvas-container">
    <canvas id="canvas" class="grid-bg"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');

    const imageLoader = document.getElementById('imageLoader');
    const btnCalibrate = document.getElementById('btnCalibrate');
    const btnDraw = document.getElementById('btnDraw');
    const btnFinish = document.getElementById('btnFinish');
    const btnUndo = document.getElementById('btnUndo');
    const btnFit = document.getElementById('btnFit');
    const btnClear = document.getElementById('btnClear');
    const scaleStatus = document.getElementById('scaleStatus');
    const resultsDiv = document.getElementById('results');

    const wallHeightInput = document.getElementById('wallHeight');
    const baseWallType = document.getElementById('baseWallType');
    const chkGypsum95 = document.getElementById('chkGypsum95');
    const chkGypsum125 = document.getElementById('chkGypsum125');
    const insulationType = document.getElementById('insulationType');

    let image = null;
    let mode = 'idle'; 
    
    // 핵심 변경점: 여러 개의 도형(선)을 담는 배열
    let shapes = []; 
    let calibPoints = [];
    
    let scale = 10; 
    let isScaleSet = false;

    let panX = 0, panY = 0;
    let zoom = 1;
    let isHDown = false;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let isShiftDown = false;
    let mouseX = 0, mouseY = 0;

    function resizeCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        if(!image && shapes.length === 0 && panX === 0 && panY === 0) {
            panX = canvas.width / 2;
            panY = canvas.height / 2;
        }
        draw();
    }
    window.addEventListener('resize', resizeCanvas);

    imageLoader.addEventListener('change', (e) => {
        if (!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            image = new Image();
            image.onload = () => {
                canvas.classList.remove('grid-bg');
                zoom = Math.min(canvas.width / image.width, canvas.height / image.height) * 0.9;
                panX = (canvas.width - image.width * zoom) / 2;
                panY = (canvas.height - image.height * zoom) / 2;
                draw();
            }
            image.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'h') {
            isHDown = true;
            canvas.style.cursor = 'grab';
        }
        if (e.key === 'Shift') isShiftDown = true;
        if (e.ctrlKey && e.key.toLowerCase() === 'z') doUndo();
    });

    window.addEventListener('keyup', (e) => {
        if (e.key.toLowerCase() === 'h') {
            isHDown = false;
            isDragging = false;
            canvas.style.cursor = mode === 'draw' || mode === 'calibrate' ? 'crosshair' : 'default';
        }
        if (e.key === 'Shift') isShiftDown = false;
    });

    canvas.addEventListener('mousedown', (e) => {
        if (isHDown || e.button === 1) {
            isDragging = true;
            dragStartX = e.clientX - panX;
            dragStartY = e.clientY - panY;
            canvas.style.cursor = 'grabbing';
            return;
        }

        if (mode === 'idle') return;

        const rect = canvas.getBoundingClientRect();
        let x = (e.clientX - rect.left - panX) / zoom;
        let y = (e.clientY - rect.top - panY) / zoom;

        // 직교 모드 계산
        if (isShiftDown && mode === 'draw' && shapes.length > 0) {
            let currentShape = shapes[shapes.length - 1];
            if (!currentShape.isFinished && currentShape.points.length > 0) {
                const last = currentShape.points[currentShape.points.length - 1];
                if (Math.abs(x - last.x) > Math.abs(y - last.y)) y = last.y;
                else x = last.x;
            }
        }

        if (mode === 'calibrate') {
            calibPoints.push({x, y});
            if (calibPoints.length === 2) {
                let pxDist = Math.hypot(calibPoints[1].x - calibPoints[0].x, calibPoints[1].y - calibPoints[0].y);
                let actual = prompt("기준선의 실제 길이는 몇 mm 입니까?");
                if (actual && !isNaN(actual)) {
                    scale = parseFloat(actual) / pxDist;
                    isScaleSet = true;
                    scaleStatus.textContent = `척도 고정됨 (1px = ${scale.toFixed(2)}mm)`;
                    scaleStatus.style.color = "#28a745";
                }
                mode = 'idle';
                calibPoints = [];
                btnCalibrate.classList.remove('active');
                updateResults();
            }
        } else if (mode === 'draw') {
            let currentShape;
            // 배열이 비어있거나 마지막 도형이 끝난 상태면 새 도형 생성
            if (shapes.length === 0 || shapes[shapes.length - 1].isFinished) {
                currentShape = { points: [], isClosed: false, isFinished: false };
                shapes.push(currentShape);
            } else {
                currentShape = shapes[shapes.length - 1];
            }

            // 스냅(도형 닫기) 체크
            if (currentShape.points.length > 2) {
                const dist = Math.hypot(x - currentShape.points[0].x, y - currentShape.points[0].y) * zoom;
                if (dist < 15) { 
                    currentShape.isClosed = true;
                    currentShape.isFinished = true; // 닫히면 자동으로 완료 처리
                    updateResults();
                    draw();
                    return;
                }
            }
            currentShape.points.push({x, y});
            updateResults();
        }
        draw();
    });

    canvas.addEventListener('mousemove', (e) => {
        if (isDragging) {
            panX = e.clientX - dragStartX;
            panY = e.clientY - dragStartY;
            draw();
            return;
        }

        const rect = canvas.getBoundingClientRect();
        let x = (e.clientX - rect.left - panX) / zoom;
        let y = (e.clientY - rect.top - panY) / zoom;

        if (isShiftDown && mode === 'draw' && shapes.length > 0) {
            let currentShape = shapes[shapes.length - 1];
            if (!currentShape.isFinished && currentShape.points.length > 0) {
                const last = currentShape.points[currentShape.points.length - 1];
                if (Math.abs(x - last.x) > Math.abs(y - last.y)) y = last.y;
                else x = last.x;
            }
        }

        mouseX = x;
        mouseY = y;
        draw();
    });

    canvas.addEventListener('mouseup', () => { 
        isDragging = false; 
        if(isHDown) canvas.style.cursor = 'grab';
    });
    
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const wheel = e.deltaY < 0 ? 1 : -1;
        let newZoom = zoom * Math.exp(wheel * 0.15);
        
        if (newZoom < 0.15) newZoom = 0.15;
        if (newZoom > 20) newZoom = 20;

        panX = mx - (mx - panX) * (newZoom / zoom);
        panY = my - (my - panY) * (newZoom / zoom);
        zoom = newZoom;
        
        draw();
    }, { passive: false });

    // 도면 찾기
    btnFit.addEventListener('click', () => {
        if (shapes.length === 0) {
            panX = canvas.width / 2;
            panY = canvas.height / 2;
            zoom = 1;
            draw();
            return;
        }

        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        let hasPoints = false;
        
        for (let shape of shapes) {
            for (let pt of shape.points) {
                minX = Math.min(minX, pt.x);
                minY = Math.min(minY, pt.y);
                maxX = Math.max(maxX, pt.x);
                maxY = Math.max(maxY, pt.y);
                hasPoints = true;
            }
        }

        if (!hasPoints) return;

        let w = maxX - minX;
        let h = maxY - minY;

        if (w === 0 || h === 0) {
            panX = canvas.width / 2 - minX;
            panY = canvas.height / 2 - minY;
            zoom = 1;
        } else {
            let padding = 100; 
            let scaleX = (canvas.width - padding * 2) / w;
            let scaleY = (canvas.height - padding * 2) / h;
            
            zoom = Math.min(scaleX, scaleY);
            if (zoom > 5) zoom = 5; 
            if (zoom < 0.1) zoom = 0.1;

            panX = canvas.width / 2 - (minX + w / 2) * zoom;
            panY = canvas.height / 2 - (minY + h / 2) * zoom;
        }
        draw();
    });

    btnCalibrate.addEventListener('click', () => {
        mode = 'calibrate';
        calibPoints = [];
        btnCalibrate.classList.add('active');
        btnDraw.classList.remove('active');
        canvas.style.cursor = 'crosshair';
    });

    btnDraw.addEventListener('click', () => {
        mode = 'draw';
        btnDraw.classList.add('active');
        btnCalibrate.classList.remove('active');
        canvas.style.cursor = 'crosshair';
    });

    // 다중 그리기 대응: 현재 도형만 완료 처리하고 그리기 모드 유지
    btnFinish.addEventListener('click', () => {
        if (mode === 'draw' && shapes.length > 0) {
            shapes[shapes.length - 1].isFinished = true;
            updateResults();
            draw();
        }
    });

    btnUndo.addEventListener('click', doUndo);

    function doUndo() {
        if (shapes.length > 0) {
            let lastShape = shapes[shapes.length - 1];
            
            if (lastShape.isClosed) {
                lastShape.isClosed = false;
                lastShape.isFinished = false; // 다시 이어서 그리도록 열어줌
                mode = 'draw';
                btnDraw.classList.add('active');
            } else if (lastShape.isFinished) {
                lastShape.isFinished = false; // 완료 취소, 이어서 그리기
                mode = 'draw';
                btnDraw.classList.add('active');
            } else {
                lastShape.points.pop();
                if (lastShape.points.length === 0) {
                    shapes.pop(); // 점 다 지워지면 도형 자체 삭제
                }
            }
            updateResults();
            draw();
        }
    }

    btnClear.addEventListener('click', () => {
        shapes = [];
        calibPoints = [];
        mode = 'idle';
        btnDraw.classList.remove('active');
        btnCalibrate.classList.remove('active');
        panX = canvas.width / 2;
        panY = canvas.height / 2;
        zoom = 1;
        resultsDiv.innerHTML = "선을 그리고 완료를 눌러주세요.";
        draw();
    });

    [wallHeightInput, baseWallType, chkGypsum95, chkGypsum125, insulationType].forEach(el => {
        el.addEventListener('change', updateResults);
    });

    function drawLineLabel(p1, p2, color) {
        let dx = p2.x - p1.x;
        let dy = p2.y - p1.y;
        let distMm = Math.hypot(dx, dy) * scale;
        
        let midX = (p1.x + p2.x) / 2;
        let midY = (p1.y + p2.y) / 2;

        ctx.save();
        ctx.translate(midX, midY);
        
        let angle = Math.atan2(dy, dx);
        if (angle > Math.PI / 2 || angle < -Math.PI / 2) {
            angle += Math.PI;
        }
        ctx.rotate(angle);

        let text = `${Math.round(distMm)} mm`;
        let fontSize = 14 / zoom;
        ctx.font = `bold ${fontSize}px 'Malgun Gothic', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';

        let textWidth = ctx.measureText(text).width;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        ctx.fillRect(-textWidth/2 - 4/zoom, -fontSize - 6/zoom, textWidth + 8/zoom, fontSize + 8/zoom);

        ctx.fillStyle = color;
        ctx.fillText(text, 0, -4/zoom);
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(panX, panY);
        ctx.scale(zoom, zoom);

        if (image) ctx.drawImage(image, 0, 0);

        if (calibPoints.length > 0) {
            ctx.strokeStyle = '#dc3545';
            ctx.lineWidth = 2 / zoom;
            ctx.beginPath();
            ctx.arc(calibPoints[0].x, calibPoints[0].y, 4/zoom, 0, Math.PI*2);
            ctx.fillStyle = '#dc3545';
            ctx.fill();
            if (mode === 'calibrate' && calibPoints.length === 1) {
                ctx.moveTo(calibPoints[0].x, calibPoints[0].y);
                ctx.lineTo(mouseX, mouseY);
                ctx.stroke();
            }
        }

        // 모든 도형(방/선) 순회하며 그리기
        for (let shape of shapes) {
            let pts = shape.points;
            if (pts.length === 0) continue;

            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4 / zoom;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) {
                ctx.lineTo(pts[i].x, pts[i].y);
            }
            
            if (shape.isClosed) {
                ctx.lineTo(pts[0].x, pts[0].y);
                ctx.fillStyle = 'rgba(204, 229, 255, 0.6)';
                ctx.fill();
            } else if (mode === 'draw' && shape === shapes[shapes.length - 1] && !shape.isFinished) {
                ctx.lineTo(mouseX, mouseY);
            }
            ctx.stroke();

            for (let i = 0; i < pts.length - 1; i++) {
                drawLineLabel(pts[i], pts[i+1], '#000000');
            }
            if (shape.isClosed) {
                drawLineLabel(pts[pts.length-1], pts[0], '#000000');
            } else if (mode === 'draw' && shape === shapes[shapes.length - 1] && !shape.isFinished) {
                drawLineLabel(pts[pts.length-1], {x: mouseX, y: mouseY}, '#dc3545');
            }

            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2 / zoom;
            for (let pt of pts) {
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 5 / zoom, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }

            if (shape.isClosed && pts.length > 2) {
                let s1 = 0, s2 = 0;
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

                for (let i = 0; i < pts.length; i++) {
                    let j = (i + 1) % pts.length;
                    s1 += (pts[i].x * scale) * (pts[j].y * scale);
                    s2 += (pts[j].x * scale) * (pts[i].y * scale);

                    minX = Math.min(minX, pts[i].x);
                    minY = Math.min(minY, pts[i].y);
                    maxX = Math.max(maxX, pts[i].x);
                    maxY = Math.max(maxY, pts[i].y);
                }
                
                let areaSqM = (Math.abs(s1 - s2) / 2 / 1000000).toFixed(2);
                let pyeong = (areaSqM * 0.3025).toFixed(2);

                let centerX = (minX + maxX) / 2;
                let centerY = (minY + maxY) / 2;

                ctx.save();
                ctx.translate(centerX, centerY);
                let fontSizeTitle = 18 / zoom;
                let fontSizeSub = 14 / zoom;
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.beginPath();
                ctx.roundRect(-60/zoom, -30/zoom, 120/zoom, 60/zoom, 8/zoom);
                ctx.fill();
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1.5 / zoom;
                ctx.stroke();

                ctx.fillStyle = '#000000';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = `bold ${fontSizeTitle}px 'Malgun Gothic', sans-serif`;
                ctx.fillText(`${areaSqM} ㎡`, 0, -10/zoom);
                
                ctx.fillStyle = '#495057';
                ctx.font = `${fontSizeSub}px 'Malgun Gothic', sans-serif`;
                ctx.fillText(`(${pyeong} 평)`, 0, 12/zoom);
                ctx.restore();
            }
        }

        ctx.restore();
    }

    function updateResults() {
        let totalLenMm = 0;
        let totalAreaSqM = 0;
        let hasPoints = false;

        for (let shape of shapes) {
            let pts = shape.points;
            if (pts.length < 1) continue;
            hasPoints = true;

            let shapeLen = 0;
            for (let i = 0; i < pts.length - 1; i++) {
                shapeLen += Math.hypot(pts[i+1].x - pts[i].x, pts[i+1].y - pts[i].y) * scale;
            }
            if (shape.isClosed && pts.length > 2) {
                shapeLen += Math.hypot(pts[0].x - pts[pts.length-1].x, pts[0].y - pts[pts.length-1].y) * scale;

                let s1 = 0, s2 = 0;
                for (let i = 0; i < pts.length; i++) {
                    let j = (i + 1) % pts.length;
                    s1 += (pts[i].x * scale) * (pts[j].y * scale);
                    s2 += (pts[j].x * scale) * (pts[i].y * scale);
                }
                totalAreaSqM += (Math.abs(s1 - s2) / 2) / 1000000;
            }
            totalLenMm += shapeLen;
        }

        if (!hasPoints) {
            resultsDiv.innerHTML = "선을 그리고 완료를 눌러주세요.";
            return;
        }

        let lenM = (totalLenMm / 1000).toFixed(2);
        let html = `<strong>총 벽체 길이(합계):</strong> ${lenM} m<br>`;
        
        if (totalAreaSqM > 0) {
            let totalPyeong = (totalAreaSqM * 0.3025).toFixed(2);
            html += `<strong>총 바닥 면적(합계):</strong> ${totalAreaSqM.toFixed(2)} ㎡ (${totalPyeong} 평)<br>`;
        }
        
        html += `<hr><strong>[전체 자재 소요량 산출]</strong><br>`;
        let hMm = parseFloat(wallHeightInput.value) || 2400;
        let wallAreaM2 = (totalLenMm / 1000) * (hMm / 1000); 
        
        const gypArea = 1.62; 
        const insArea = 0.45; 
        const alcArea = 0.18; 

        let baseType = baseWallType.value;
        if (baseType === 'alc75') {
            html += `• ALC 75T: <b>${Math.ceil(wallAreaM2 / alcArea)}</b> 장<br>`;
        } else if (baseType === 'alc100') {
            html += `• ALC 100T: <b>${Math.ceil(wallAreaM2 / alcArea)}</b> 장<br>`;
        } else if (baseType === 'stud') {
            // 목상의 경우 전체 길이 기준 대략 산출
            let totalNodes = 0;
            shapes.forEach(s => totalNodes += s.points.length);
            let studLenMm = (totalLenMm * 2) + ((Math.ceil(totalLenMm / 450) + totalNodes) * hMm);
            html += `• 투바이포(3.6m): <b>${Math.ceil(studLenMm / 3600)}</b> 개<br>`;
        }

        if (chkGypsum95.checked) html += `• 일반 석고 9.5T: <b>${Math.ceil(wallAreaM2 / gypArea)}</b> 장<br>`;
        if (chkGypsum125.checked) html += `• 차음 석고 12.5T: <b>${Math.ceil(wallAreaM2 / gypArea)}</b> 장<br>`;

        let ins = insulationType.value;
        if (ins !== 'none') {
            let name = ins === 'glasswool' ? '글라스울' : '락울';
            html += `• ${name}: <b>${Math.ceil(wallAreaM2 / insArea)}</b> 매<br>`;
        }

        if (!isScaleSet) {
            html += `<br><span style="color:#dc3545; font-size:12px;">※ 현재 척도가 고정되지 않았습니다. (임시비율 적용중) 먼저 <b>척도 설정</b>을 해주세요.</span>`;
        }

        resultsDiv.innerHTML = html;
    }

    resizeCanvas();
    setTimeout(resizeCanvas, 100);
</script>
</body>
</html>
