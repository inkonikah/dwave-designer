<!DOCTYPE html>
<html>
<head>
    <title>DWave Designer v24.0 - Final Tool</title>
    <style>
        :root { --bg: #121212; --accent: #27ae60; --blue: #3498db; }
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: #fff; overflow: hidden; }
        
        /* 작업 영역 (도면) */
        .canvas-area { flex: 1; position: relative; background: #333; overflow: hidden; }
        canvas { background: #fff; transform-origin: 0 0; cursor: crosshair; }

        /* 도구 상자 */
        .tool-bar { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 15px; z-index: 100; border: 1px solid #444; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; color: #fff; font-size: 14px; transition: 0.2s; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        
        /* 오른쪽 리포트 사이드바 */
        .sidebar { width: 420px; background: #f0f2f5; color: #333; padding: 25px; overflow-y: auto; border-left: 2px solid #444; }
        .room-card { background: #fff; border-radius: 15px; padding: 20px; margin-bottom: 20px; border-left: 10px solid var(--blue); box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        .room-title { font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .val { color: #c0392b; font-weight: bold; font-size: 1.1em; }
        .del-btn { background: #e74c3c; color: #fff; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        input[type="file"] { margin-bottom: 15px; color: #fff; font-size: 12px; width: 100%; }
        .status-info { font-size: 12px; color: #aaa; margin-top: 15px; line-height: 1.6; background: #222; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="tool-bar">
    <h2 style="margin:0 0 15px 0; color:var(--blue);">DWave Pro v24.0</h2>
    <input type="file" id="up" accept="image/*">
    
    <button class="btn" style="background:#f1c40f; color:#000;" onclick="setMode('scale')">📏 1단계: 도면 1m 기준 긋기</button>
    <button class="btn" style="background:var(--accent);" onclick="setMode('room')">🏠 2단계: 방 영역 그리기</button>
    <button class="btn" style="background:#7f8c8d;" onclick="resetAll()">🧼 전체 초기화</button>
    
    <div class="status-info">
        현재 모드: <b id="modeTxt" style="color:var(--blue);">방 그리기</b><br>
        * <b>휠(Wheel)</b>: 도면 확대/축소<br>
        * <b>우클릭 드래그</b>: 도면 이동<br>
        * <b>좌클릭 드래그</b>: 측정 및 그리기
    </div>
</div>

<div class="canvas-area">
    <canvas id="cvs"></canvas>
</div>

<div class="sidebar">
    <h2 style="margin-top:0; border-bottom:3px solid var(--accent); padding-bottom:10px;">실시간 자재 산출서</h2>
    <div id="roomContainer">
        <p style="color:#999; text-align:center; margin-top:50px;">도면을 업로드하고 척도를 맞춘 뒤<br>방 영역을 지정해 주세요.</p>
    </div>
</div>

<script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    let img = new Image(), rooms = [], mode = 'room', isDown = false;
    let scalePxM = 100, zoom = 1, offX = 0, offY = 0;
    let sx, sy;

    // 1. 도면 파일 업로드
    document.getElementById('up').onchange = (e) => {
        const r = new FileReader();
        r.onload = (v) => { 
            img.onload = () => { 
                cvs.width = img.width; 
                cvs.height = img.height; 
                // 화면 중앙 정렬 초기값
                offX = (window.innerWidth - 420 - img.width) / 2;
                update(); 
            }; 
            img.src = v.target.result; 
        };
        r.readAsDataURL(e.target.files[0]);
    };

    // 2. 줌 기능 (마우스 휠)
    window.addEventListener('wheel', (e) => {
        const speed = 0.1;
        const oldZoom = zoom;
        if (e.deltaY < 0) zoom *= 1.1;
        else zoom /= 1.1;
        update();
    }, {passive: false});

    // 3. 우클릭 메뉴 방지 및 드로잉 로직
    cvs.oncontextmenu = (e) => e.preventDefault();
    
    cvs.onmousedown = (e) => {
        const mx = (e.offsetX - offX) / zoom;
        const my = (e.offsetY - offY) / zoom;
        if(e.button === 0) { // 좌클릭 시작
            isDown = true; 
            sx = mx; 
            sy = my; 
        }
    };

    window.onmousemove = (e) => {
        const mx = (e.offsetX - offX) / zoom;
        const my = (e.offsetY - offY) / zoom;
        
        if (isDown) {
            update();
            ctx.setTransform(zoom, 0, 0, zoom, offX, offY);
            if(mode === 'scale') {
                ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 4/zoom;
                ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(mx, my); ctx.stroke();
                const d = Math.sqrt(Math.pow(mx-sx, 2) + Math.pow(my-sy, 2)) / scalePxM;
                ctx.fillStyle = "#f1c40f"; ctx.fillText(`측정: ${d.toFixed(2)}m`, mx, my);
            } else {
                ctx.strokeStyle = '#3498db'; ctx.lineWidth = 2/zoom;
                ctx.strokeRect(sx, sy, mx - sx, my - sy);
                // 선 위에 실시간 치수 표시
                const wM = Math.abs(mx - sx) / scalePxM;
                const dM = Math.abs(my - sy) / scalePxM;
                ctx.fillStyle = "#3498db"; ctx.font = `bold ${16/zoom}px Arial`;
                ctx.fillText(`${wM.toFixed(2)}m x ${dM.toFixed(2)}m`, sx, sy - 10/zoom);
            }
        }
        // 우클릭 팬 이동
        if (e.buttons === 2) {
            offX += e.movementX;
            offY += e.movementY;
            update();
        }
    };

    window.onmouseup = (e) => {
        if (!isDown) return; 
        isDown = false;
        const ex = (e.offsetX - offX) / zoom;
        const ey = (e.offsetY - offY) / zoom;
        const dist = Math.sqrt(Math.pow(ex-sx, 2) + Math.pow(ey-sy, 2));

        if(mode === 'scale') {
            const m = prompt("방금 그은 노란 선의 실제 길이는 몇 m인가요? (도면 치수 입력)", "1");
            if(m) {
                scalePxM = dist / parseFloat(m);
                alert("기준 척도가 설정되었습니다. 이제 방을 그리세요.");
                setMode('room');
            }
        } else {
            const wM = Math.abs(ex - sx) / scalePxM;
            const dM = Math.abs(ey - sy) / scalePxM;
            if(wM > 0.1) {
                rooms.push({ id: Date.now(), sx, sy, w: ex-sx, d: ey-sy, rw: wM, rd: dM });
            }
        }
        update();
    };

    function setMode(m) { 
        mode = m; 
        document.getElementById('modeTxt').innerText = m === 'scale' ? "척도 설정 중..." : "방 그리기"; 
    }

    function resetAll() { if(confirm("모든 데이터를 지우시겠습니까?")) { rooms = []; update(); } }
    function delRoom(id) { rooms = rooms.filter(r => r.id !== id); update(); }

    function update() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        ctx.setTransform(zoom, 0, 0, zoom, offX, offY);
        
        if(img.src) ctx.drawImage(img, 0, 0);
        
        // 그려진 방 표시
        rooms.forEach((r, i) => {
            ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 3/zoom;
            ctx.strokeRect(r.sx, r.sy, r.w, r.d);
            ctx.fillStyle = 'rgba(39, 174, 96, 0.15)'; ctx.fillRect(r.sx, r.sy, r.w, r.d);
            ctx.fillStyle = '#000'; ctx.font = `bold ${14/zoom}px Arial`;
            ctx.fillText(`Room #${i+1} (${r.rw.toFixed(2)}m x ${r.rd.toFixed(2)}m)`, r.sx + 5/zoom, r.sy + 18/zoom);
        });

        // 우측 리포트 업데이트
        const container = document.getElementById('roomContainer');
        container.innerHTML = "";
        
        rooms.forEach((r, i) => {
            const peri = (r.rw + r.rd) * 2;
            const area = peri * 2.7; // 기본 층고 2.7m
            const div = document.createElement('div');
            div.className = 'room-card';
            div.innerHTML = `
                <div class="room-title">
                    <span>#${i+1} 공간 (${r.rw.toFixed(2)}m x ${r.rd.toFixed(2)}m)</span>
                    <button class="del-btn" onclick="delRoom(${r.id})">삭제</button>
                </div>
                둘레: ${peri.toFixed(2)}m / 벽체면적: ${area.toFixed(1)}㎡<br>
                <div style="margin-top:10px; padding-top:10px; border-top:1px dashed #ddd;">
                    ALC(더블): <span class="val">${Math.ceil(area/0.24*2*1.05)}장</span><br>
                    투바이(450): <span class="val">${Math.ceil(peri/0.45*1.1)}본</span> / 석고(4P): <span class="val">${Math.ceil(area/1.62*4*1.1)}매</span>
                </div>
            `;
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
