<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dwave Home - Material Takeoff</title>
    <style>
        :root {
            --primary: #4361ee;
            --success: #2b9348;
            --danger: #d90429;
            --dark: #2b2d42;
            --light-bg: #f8f9fa;
            --card-bg: #ffffff;
            --border: #e9ecef;
        }

        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Pretendard', sans-serif; overflow: hidden; background-color: #e0e4e8; }
        
        #sidebar { width: 400px; background: var(--card-bg); display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 10; }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--border); background: var(--dark); color: white; }
        .sidebar-header h2 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: -1px; }
        
        .sidebar-content { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .sidebar-content::-webkit-scrollbar { width: 6px; }
        .sidebar-content::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 4px; }

        .section-box { background: var(--light-bg); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        .section-title { margin: 0 0 12px 0; font-size: 14px; font-weight: 800; color: var(--dark); }
        
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
        .form-group label { font-size: 12px; font-weight: 600; color: #666; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #ced4da; border-radius: 8px; font-size: 13px; }
        
        .checkbox-group { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; transition: 0.2s; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary.active { background-color: var(--danger); box-shadow: 0 0 0 4px rgba(217, 4, 41, 0.2); }
        .btn-success { background-color: var(--success); color: white; }
        .btn-outline { background-color: white; border: 1px solid #ced4da; }
        .btn-full { width: 100%; margin-top: 5px; }

        .results-header { font-size: 18px; font-weight: 900; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid var(--dark); }
        .room-card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .room-header { font-weight: 800; font-size: 14px; display: flex; justify-content: space-between; align-items: center; color: var(--primary); }
        .room-data { display: flex; justify-content: space-between; font-size: 13px; margin-top: 5px; }
        
        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; background-color: #f1f3f5; }
        canvas { display: block; }
        canvas.grid-bg { 
            background-image: linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 50px 50px; 
        }

        .cursor-erase { cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 24 24' fill='none' stroke='red' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z'></path><line x1='6' y1='11' x2='15' y2='20'></line></svg>") 8 20, auto !important; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <h2>Dwave Home</h2>
        <p>CONSTRUCTION MATERIAL TAKEOFF</p>
    </div>
    <div class="sidebar-content">
        <div class="section-box">
            <div class="section-title">📍 1. 척도 설정</div>
            <button id="btnCalibrate" class="btn-primary btn-full">📏 실제 길이 기준 잡기</button>
            <div id="scaleStatus" style="font-size:11px; text-align:center; margin-top:8px; color:var(--danger); font-weight:bold;">척도 미설정 (1px=10mm)</div>
        </div>

        <div class="section-box">
            <div class="section-title">🏗️ 2. 도면 설계</div>
            <div class="btn-grid">
                <button id="btnDraw" class="btn-primary">✏️ 선 그리기</button>
                <button id="btnDelete" class="btn-outline">❌ 개별 삭제</button>
                <button id="btnFinish" class="btn-success">✔️ 현재 벽 마감</button>
                <button id="btnUndo" class="btn-outline">↩️ 되돌리기</button>
            </div>
        </div>

        <div class="section-box">
            <div class="section-title">📦 3. 자재 사양 (실시간 반영)</div>
            <div class="form-group">
                <label>벽 높이 (mm)</label>
                <input type="number" id="wallHeight" value="2400">
            </div>
            <div class="form-group">
                <label>기본 골조</label>
                <select id="baseWallType">
                    <option value="alc75">ALC 블록 (검정)</option>
                    <option value="stud">목상 2x4 (갈색)</option>
                </select>
            </div>
            <div class="checkbox-group"><input type="checkbox" id="chkGypsum95" checked> <label for="chkGypsum95">일반석고 (청록)</label></div>
            <div class="checkbox-group"><input type="checkbox" id="chkGypsum125"> <label for="chkGypsum125">차음석고 (파랑)</label></div>
            <div class="checkbox-group" style="margin-top:10px; padding:10px; background:#fff0f3; border-radius:8px;">
                <input type="checkbox" id="chkDoubleLeaf"> <label for="chkDoubleLeaf" style="color:var(--danger); font-weight:bold;">🔥 더블리프 (이중벽)</label>
            </div>
        </div>

        <div id="resultsArea"><div class="results-header">Dwave 자재산출</div></div>
    </div>
</div>

<div id="canvas-container"><canvas id="canvas" class="grid-bg"></canvas></div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');
    const resultsArea = document.getElementById('resultsArea');

    let mode = 'idle'; 
    let shapes = []; 
    let currentPoints = [];
    let calibPoints = [];
    let scale = 10; 
    let isScaleSet = false;
    let panX = 0, panY = 0, zoom = 1;
    let isHDown = false, isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let mouseX = 0, mouseY = 0;

    function resizeCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        if(panX === 0) { panX = canvas.width / 2; panY = canvas.height / 2; }
        draw();
    }
    window.addEventListener('resize', resizeCanvas);

    function getCurSpec() {
        let base = document.getElementById('baseWallType').value;
        let color = base === 'alc75' ? '#000000' : '#8b4513';
        if(document.getElementById('chkGypsum125').checked) color = '#0000ff';
        else if(document.getElementById('chkGypsum95').checked) color = '#008080';
        return {
            color: color,
            height: parseFloat(document.getElementById('wallHeight').value),
            double: document.getElementById('chkDoubleLeaf').checked,
            lw: document.getElementById('chkDoubleLeaf').checked ? 8 : 4
        };
    }

    function setMode(m, btn) {
        mode = m;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        canvas.classList.remove('cursor-erase');
        if(mode === 'delete') canvas.classList.add('cursor-erase');
    }

    document.getElementById('btnCalibrate').onclick = (e) => setMode('calibrate', e.target);
    document.getElementById('btnDraw').onclick = (e) => setMode('draw', e.target);
    document.getElementById('btnDelete').onclick = (e) => setMode('delete', e.target);

    canvas.addEventListener('mousedown', (e) => {
        if (isHDown || e.button === 1) { isDragging = true; dragStartX = e.clientX - panX; dragStartY = e.clientY - panY; return; }
        const rect = canvas.getBoundingClientRect();
        let x = (e.clientX - rect.left - panX) / zoom, y = (e.clientY - rect.top - panY) / zoom;

        if (mode === 'delete') {
            for (let i = shapes.length - 1; i >= 0; i--) {
                let s = shapes[i];
                let minX = Math.min(...s.pts.map(p => p.x)), maxX = Math.max(...s.pts.map(p => p.x));
                let minY = Math.min(...s.pts.map(p => p.y)), maxY = Math.max(...s.pts.map(p => p.y));
                if (Math.hypot(x - (minX+maxX)/2, y - (minY+maxY)/2) < 60/zoom) { shapes.splice(i, 1); break; }
            }
            updateResults(); draw(); return;
        }

        if (mode === 'calibrate') {
            calibPoints.push({x, y});
            if (calibPoints.length === 2) {
                let dist = Math.hypot(calibPoints[1].x - calibPoints[0].x, calibPoints[1].y - calibPoints[0].y);
                let actual = prompt("기준선의 실제 길이(mm):");
                if(actual) { scale = actual / dist; isScaleSet = true; document.getElementById('scaleStatus').innerText = "척도 설정 완료"; document.getElementById('scaleStatus').style.color = "green"; }
                setMode('idle'); calibPoints = [];
            }
        } else if (mode === 'draw') {
            if (currentPoints.length > 2 && Math.hypot(x - currentPoints[0].x, y - currentPoints[0].y) < 20/zoom) {
                shapes.push({ name: `Room ${shapes.filter(s=>s.isClosed).length + 1}`, pts: [...currentPoints], isClosed: true, spec: getCurSpec() });
                currentPoints = []; updateResults(); draw(); return;
            }
            currentPoints.push({x, y});
        }
        draw();
    });

    canvas.addEventListener('mousemove', (e) => {
        if (isDragging) { panX = e.clientX - dragStartX; panY = e.clientY - dragStartY; draw(); return; }
        const rect = canvas.getBoundingClientRect();
        mouseX = (e.clientX - rect.left - panX) / zoom; mouseY = (e.clientY - rect.top - panY) / zoom;
        draw();
    });

    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const mx = e.clientX - canvas.offsetLeft, my = e.clientY - canvas.offsetTop;
        let newZoom = zoom * Math.exp((e.deltaY < 0 ? 1 : -1) * 0.1);
        newZoom = Math.max(0.1, Math.min(newZoom, 10));
        panX = mx - (mx - panX) * (newZoom / zoom); panY = my - (my - panY) * (newZoom / zoom); zoom = newZoom;
        draw();
    }, { passive: false });

    function drawLabel(p1, p2, color) {
        let mm = Math.hypot(p2.x - p1.x, p2.y - p1.y) * scale;
        ctx.save();
        ctx.translate((p1.x + p2.x) / 2, (p1.y + p2.y) / 2);
        ctx.font = `bold ${12/zoom}px sans-serif`;
        ctx.fillStyle = 'white';
        let txt = Math.round(mm) + 'mm';
        let w = ctx.measureText(txt).width;
        ctx.fillRect(-w/2-2/zoom, -14/zoom, w+4/zoom, 16/zoom);
        ctx.fillStyle = color; ctx.textAlign='center'; ctx.fillText(txt, 0, 0);
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(panX, panY); ctx.scale(zoom, zoom);

        shapes.forEach(s => {
            ctx.strokeStyle = s.spec.color; ctx.lineWidth = s.spec.lw/zoom; ctx.lineJoin='round';
            ctx.beginPath(); ctx.moveTo(s.pts[0].x, s.pts[0].y);
            s.pts.forEach(p => ctx.lineTo(p.x, p.y)); if(s.isClosed) ctx.closePath();
            ctx.stroke();
            if(s.spec.double) { ctx.strokeStyle='white'; ctx.lineWidth=2/zoom; ctx.stroke(); }
            for(let i=0; i<s.pts.length-1; i++) drawLabel(s.pts[i], s.pts[i+1], s.spec.color);
            if(s.isClosed) {
                drawLabel(s.pts[s.pts.length-1], s.pts[0], s.spec.color);
                let minX = Math.min(...s.pts.map(p=>p.x)), maxX = Math.max(...s.pts.map(p=>p.x)), minY = Math.min(...s.pts.map(p=>p.y)), maxY = Math.max(...s.pts.map(p=>p.y));
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.roundRect((minX+maxX)/2-40/zoom, (minY+maxY)/2-20/zoom, 80/zoom, 40/zoom, 8/zoom); ctx.fill();
                ctx.strokeStyle = s.spec.color; ctx.lineWidth=2/zoom; ctx.stroke();
                ctx.fillStyle=s.spec.color; ctx.font=`bold ${13/zoom}px sans-serif`; ctx.textAlign='center'; ctx.fillText(s.name, (minX+maxX)/2, (minY+maxY)/2+5/zoom);
            }
        });

        if (currentPoints.length > 0) {
            let spec = getCurSpec();
            ctx.strokeStyle = spec.color; ctx.lineWidth = spec.lw/zoom;
            ctx.beginPath(); ctx.moveTo(currentPoints[0].x, currentPoints[0].y);
            currentPoints.forEach(p => ctx.lineTo(p.x, p.y)); ctx.lineTo(mouseX, mouseY);
            ctx.stroke();
            if(spec.double) { ctx.strokeStyle='white'; ctx.lineWidth=2/zoom; ctx.stroke(); }
            for(let i=0; i<currentPoints.length-1; i++) drawLabel(currentPoints[i], currentPoints[i+1], spec.color);
            drawLabel(currentPoints[currentPoints.length-1], {x:mouseX, y:mouseY}, spec.color);
        }
        ctx.restore();
    }

    function updateResults() {
        let html = `<div class="results-header">Dwave 자재산출</div>`;
        shapes.forEach(s => {
            let p = 0; for(let i=0; i<s.pts.length-1; i++) p += Math.hypot(s.pts[i+1].x-s.pts[i].x, s.pts[i+1].y-s.pts[i].y)*scale;
            if(s.isClosed) p += Math.hypot(s.pts[s.pts.length-1].x-s.pts[0].x, s.pts[s.pts.length-1].y-s.pts[0].y)*scale;
            let wArea = (p/1000) * (s.spec.height/1000) * (s.spec.double ? 2 : 1);
            html += `<div class="room-card"><div class="room-header">${s.name} <span style="font-size:10px; background:#eee; padding:2px 5px; border-radius:4px;">H:${s.spec.height}</span></div><div class="room-data"><span>벽 면적:</span> <b style="color:var(--success)">${wArea.toFixed(1)} ㎡</b></div></div>`;
        });
        resultsArea.innerHTML = html;
    }

    window.addEventListener('keydown', (e) => { if(e.key.toLowerCase()==='h') isHDown = true; });
    window.addEventListener('keyup', (e) => { if(e.key.toLowerCase()==='h') isHDown = false; });
    document.getElementById('btnFinish').onclick = () => { if(currentPoints.length > 1) { shapes.push({name:`Wall ${shapes.length+1}`, pts:[...currentPoints], isClosed:false, spec:getCurSpec()}); currentPoints=[]; updateResults(); draw(); } };
    document.getElementById('btnUndo').onclick = () => { currentPoints.pop(); draw(); };
    document.getElementById('btnFit').onclick = () => { panX=canvas.width/2; panY=canvas.height/2; zoom=1; draw(); };

    resizeCanvas();
</script>
</body>
</html>
