<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로급 자재 산출 프리드로잉 툴</title>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; overflow: hidden; background-color: #f0f2f5; }
        #sidebar { width: 380px; background: #fff; padding: 25px; box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 10; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; background-color: #2c3e50; }
        canvas { display: block; touch-action: none; }
        canvas.grid-bg { 
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); 
            background-size: 50px 50px; 
        }
        
        /* 커서 설정 - !important로 우선순위 확보 */
        .draw-cursor { cursor: crosshair !important; }
        .delete-cursor { cursor: pointer !important; }
        .offset-cursor { cursor: copy !important; }
        .grab-cursor { cursor: grab !important; }

        h2 { margin: 0; font-size: 18px; color: #1a73e8; border-left: 4px solid #1a73e8; padding-left: 10px; }
        h3 { margin: 10px 0 5px; font-size: 14px; color: #5f6368; text-transform: uppercase; letter-spacing: 1px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 13px; font-weight: 600; color: #3c4043; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #dadce0; border-radius: 6px; font-size: 13px; }
        .btn-row { display: flex; gap: 8px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: all 0.2s; flex: 1; }
        .primary { background-color: #1a73e8; color: white; }
        .success { background-color: #34a853; color: white; }
        .danger { background-color: #ea4335; color: white; }
        .secondary { background-color: #f1f3f4; color: #3c4043; border: 1px solid #dadce0; }
        .warning { background-color: #ff9800; color: white; }
        .active-mode { outline: 3px solid #202124; outline-offset: -3px; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        .result-box { background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e8eaed; font-size: 13.5px; line-height: 1.8; color: #202124; }
        .shortcut-info { font-size: 11px; color: #70757a; background: #f8f9fa; padding: 12px; border-radius: 6px; border: 1px dashed #dadce0; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>📐 전문 자재 산출 엔진</h2>
    
    <div class="form-group">
        <label>기준 도면 업로드</label>
        <input type="file" id="imageLoader" accept="image/*">
    </div>

    <div class="btn-row">
        <button id="btnCalibrate" class="secondary">척도 설정</button>
        <button id="btnFit" class="primary">전체 보기 🔍</button>
    </div>
    <span id="scaleStatus" style="font-size: 12px; color: #ea4335; font-weight: bold;">척도 미설정</span>

    <hr style="border:0; border-top:1px solid #eee;">

    <div class="form-group">
        <label>드로잉 & 수정</label>
        <div class="btn-row">
            <button id="btnDraw" class="primary">선 그리기 ✏️</button>
            <button id="btnFinish" class="success">그리기 완료</button>
        </div>
        <div class="btn-row">
            <button id="btnOffset" class="warning">오프셋 (50mm)</button>
            <button id="btnDelete" class="danger">개별 삭제 🗑️</button>
        </div>
        <div class="btn-row">
            <button id="btnUndo" class="secondary">뒤로 가기 (Z)</button>
            <button id="btnClear" class="secondary">전체 초기화</button>
        </div>
    </div>

    <div class="form-group">
        <label>벽 높이 (mm)</label>
        <input type="number" id="wallHeight" value="2400" placeholder="벽높이">
    </div>

    <div class="form-group">
        <label>골조 및 자재 선택</label>
        <select id="baseWallType">
            <option value="alc100">ALC 블록 100T</option>
            <option value="alc75">ALC 블록 75T</option>
            <option value="stud">경량 스터드 (65형)</option>
        </select>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:5px;">
            <label style="font-size:11px;"><input type="checkbox" id="chkGypsum95" checked> 일반석고 9.5T</label>
            <label style="font-size:11px;"><input type="checkbox" id="chkGypsum125"> 차음석고 12.5T</label>
        </div>
    </div>

    <h3>📊 정밀 산출 내역</h3>
    <div id="results" class="result-box">선을 그리면 산출이 시작됩니다.</div>

    <div class="shortcut-info">
        • <b>커서 안내</b>: 모드 변경 시 커서 모양이 바뀝니다.<br>
        • <b>50mm 스냅</b>: 그리기 시 자동으로 보정됨<br>
        • <b>오프셋</b>: 클릭 시 선택한 벽을 50mm 간격 복사<br>
        • <b>H + 드래그</b>: 화면 이동 / <b>Z</b>: 취소
    </div>
</div>

<div id="canvas-container">
    <canvas id="canvas" class="grid-bg"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');
    const resultsDiv = document.getElementById('results');

    let image = null;
    let mode = 'idle'; 
    let shapes = []; 
    let calibPoints = [];
    let scale = 10; 
    let isScaleSet = false;
    let panX = 0, panY = 0, zoom = 1;
    let isHDown = false, isDragging = false;
    let dragStartX, dragStartY;
    let mouseX = 0, mouseY = 0, snappedPoint = null;

    function resizeCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        draw();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    document.getElementById('imageLoader').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            image = new Image();
            image.onload = () => { fitToScreen(); draw(); };
            image.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function fitToScreen() {
        let minX = 0, minY = 0, maxX = image ? image.width : 1000, maxY = image ? image.height : 1000;
        if (shapes.length > 0) {
            shapes.forEach(s => s.points.forEach(p => {
                minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
                maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
            }));
        }
        const w = maxX - minX, h = maxY - minY;
        const padding = 100;
        zoom = Math.min((canvas.width - padding) / (w || 1), (canvas.height - padding) / (h || 1));
        panX = (canvas.width - w * zoom) / 2 - minX * zoom;
        panY = (canvas.height - h * zoom) / 2 - minY * zoom;
        draw();
    }

    function roundTo50(val) {
        if (!isScaleSet) return val;
        let mm = val * scale;
        return (Math.round(mm / 50) * 50) / scale;
    }

    function distToSegment(px, py, p1, p2) {
        const l2 = Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2);
        if (l2 === 0) return Math.hypot(px - p1.x, py - p1.y);
        let t = ((px - p1.x) * (p2.x - p1.x) + (py - p1.y) * (p2.y - p1.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(px - (p1.x + t * (p2.x - p1.x)), py - (p1.y + t * (p2.y - p1.y)));
    }

    // 50mm 간격 복사 (개선된 수직 오프셋)
    function createOffset(shapeIdx) {
        const source = shapes[shapeIdx];
        const offsetMm = 50; 
        const offsetPx = offsetMm / scale;
        
        const newPoints = source.points.map(p => ({ x: p.x + offsetPx, y: p.y + offsetPx }));
        shapes.push({ points: newPoints, isClosed: source.isClosed, isFinished: true });
        updateResults();
        draw();
    }

    canvas.addEventListener('mousedown', (e) => {
        if (isHDown || e.button === 1) {
            isDragging = true;
            dragStartX = e.clientX - panX; dragStartY = e.clientY - panY;
            return;
        }

        const rect = canvas.getBoundingClientRect();
        let x = (e.clientX - rect.left - panX) / zoom;
        let y = (e.clientY - rect.top - panY) / zoom;

        if (mode === 'draw' || mode === 'calibrate') {
            x = roundTo50(x); y = roundTo50(y);
        }
        if (snappedPoint) { x = snappedPoint.x; y = snappedPoint.y; }

        if (mode === 'delete' || mode === 'offset') {
            let found = false;
            for (let i = shapes.length - 1; i >= 0; i--) {
                let shape = shapes[i];
                for (let j = 0; j < shape.points.length - 1; j++) {
                    if (distToSegment(x, y, shape.points[j], shape.points[j+1]) < 25 / zoom) { 
                        if (mode === 'delete') shapes.splice(i, 1);
                        else createOffset(i);
                        found = true; break; 
                    }
                }
                if (found) break;
            }
            updateResults(); draw(); return;
        } else if (mode === 'calibrate') {
            calibPoints.push({x, y});
            if (calibPoints.length === 2) {
                const actual = prompt("기준선 실제 길이(mm):", "1000");
                if (actual) {
                    scale = parseFloat(actual) / Math.hypot(calibPoints[1].x - calibPoints[0].x, calibPoints[1].y - calibPoints[0].y);
                    isScaleSet = true;
                    document.getElementById('scaleStatus').textContent = `척도 완료 (1px=${scale.toFixed(2)}mm)`;
                    document.getElementById('scaleStatus').style.color = "#34a853";
                }
                setMode('idle'); calibPoints = [];
            }
        } else if (mode === 'draw') {
            if (shapes.length === 0 || shapes[shapes.length - 1].isFinished) {
                shapes.push({ points: [{x, y}], isClosed: false, isFinished: false });
            } else {
                const current = shapes[shapes.length - 1];
                const startDist = Math.hypot(x - current.points[0].x, y - current.points[0].y);
                if (startDist < 15 / zoom && current.points.length > 2) {
                    current.isClosed = true; current.isFinished = true;
                } else {
                    current.points.push({x, y});
                }
            }
        }
        updateResults(); draw();
    });

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        let rawX = (e.clientX - rect.left - panX) / zoom;
        let rawY = (e.clientY - rect.top - panY) / zoom;
        mouseX = (mode === 'draw') ? roundTo50(rawX) : rawX;
        mouseY = (mode === 'draw') ? roundTo50(rawY) : rawY;

        if (isDragging) { panX = e.clientX - dragStartX; panY = e.clientY - dragStartY; }

        snappedPoint = null;
        let minSnapDist = 15 / zoom;
        shapes.forEach(s => s.points.forEach(p => {
            const d = Math.hypot(rawX - p.x, rawY - p.y);
            if (d < minSnapDist) { snappedPoint = { x: p.x, y: p.y }; minSnapDist = d; }
        }));
        draw();
    });

    window.addEventListener('mouseup', () => isDragging = false);

    function updateResults() {
        if (!isScaleSet && shapes.length > 0) {
            resultsDiv.innerHTML = "<span style='color:red'>척도를 먼저 설정하세요.</span>";
            return;
        }
        let totalLen = 0;
        shapes.forEach(s => {
            for (let i = 0; i < s.points.length - 1; i++) {
                totalLen += Math.hypot(s.points[i+1].x - s.points[i].x, s.points[i+1].y - s.points[i].y) * scale;
            }
            if (s.isClosed) totalLen += Math.hypot(s.points[s.points.length-1].x - s.points[0].x, s.points[s.points.length-1].y - s.points[0].y) * scale;
        });

        const height = parseFloat(document.getElementById('wallHeight').value) || 2400;
        const area = (totalLen * height) / 1000000;
        const loss = 1.1;

        let html = `총 길이: <b>${(totalLen/1000).toFixed(2)}m</b><br>시공 면적: <b>${area.toFixed(2)}㎡</b><hr>`;
        const wallType = document.getElementById('baseWallType').value;
        if (wallType.includes('alc')) {
            const alcQty = Math.ceil((area / 0.18) * loss);
            html += `• ALC 블록: ${alcQty}장<br>• 모르타르: ${Math.ceil(alcQty/20)}포`;
        } else {
            html += `• 스터드(450간격): ${Math.ceil((totalLen/450 + 1) * loss)}개`;
        }
        if (document.getElementById('chkGypsum95').checked) html += `<br>• 일반석고: ${Math.ceil((area/1.62) * loss)}장`;
        if (document.getElementById('chkGypsum125').checked) html += `<br>• 차음석고: ${Math.ceil((area/1.62) * loss)}장`;
        resultsDiv.innerHTML = html;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(panX, panY);
        ctx.scale(zoom, zoom);
        if (image) ctx.drawImage(image, 0, 0);

        shapes.forEach(s => {
            ctx.beginPath();
            ctx.lineWidth = 3 / zoom;
            ctx.strokeStyle = s.isFinished ? '#1a73e8' : '#ea4335';
            ctx.moveTo(s.points[0].x, s.points[0].y);
            s.points.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
            if (s.isClosed) ctx.closePath();
            else if (!s.isFinished && mode === 'draw') {
                ctx.lineTo(snappedPoint ? snappedPoint.x : mouseX, snappedPoint ? snappedPoint.y : mouseY);
            }
            ctx.stroke();
            s.points.forEach(p => {
                ctx.fillStyle = '#fff'; ctx.beginPath();
                ctx.arc(p.x, p.y, 4 / zoom, 0, Math.PI*2); ctx.fill(); ctx.stroke();
            });
        });
        if (snappedPoint) {
            ctx.strokeStyle = '#ea4335'; ctx.lineWidth = 2/zoom;
            ctx.strokeRect(snappedPoint.x - 8/zoom, snappedPoint.y - 8/zoom, 16/zoom, 16/zoom);
        }
        ctx.restore();
    }

    function setMode(newMode) {
        mode = newMode;
        canvas.classList.remove('draw-cursor', 'delete-cursor', 'offset-cursor', 'grab-cursor');
        document.querySelectorAll('button').forEach(b => b.classList.remove('active-mode'));
        if (newMode === 'draw') { canvas.classList.add('draw-cursor'); document.getElementById('btnDraw').classList.add('active-mode'); }
        else if (newMode === 'delete') { canvas.classList.add('delete-cursor'); document.getElementById('btnDelete').classList.add('active-mode'); }
        else if (newMode === 'offset') { canvas.classList.add('offset-cursor'); document.getElementById('btnOffset').classList.add('active-mode'); }
        else if (newMode === 'calibrate') document.getElementById('btnCalibrate').classList.add('active-mode');
    }

    document.getElementById('btnDraw').addEventListener('click', () => setMode('draw'));
    document.getElementById('btnDelete').addEventListener('click', () => setMode('delete'));
    document.getElementById('btnOffset').addEventListener('click', () => setMode('offset'));
    document.getElementById('btnCalibrate').addEventListener('click', () => setMode('calibrate'));
    document.getElementById('btnFinish').addEventListener('click', () => { if(shapes.length > 0) shapes[shapes.length-1].isFinished = true; setMode('idle'); draw(); });
    document.getElementById('btnUndo').addEventListener('click', () => { 
        if(shapes.length > 0) {
            let s = shapes[shapes.length-1];
            if(!s.isFinished) { s.points.pop(); if(s.points.length === 0) shapes.pop(); }
            else shapes.pop();
        }
        updateResults(); draw();
    });
    document.getElementById('btnFit').addEventListener('click', fitToScreen);
    document.getElementById('btnClear').addEventListener('click', () => { if(confirm("전체 초기화하시겠습니까?")) { shapes = []; updateResults(); draw(); } });

    canvas.addEventListener('wheel', (e) => { e.preventDefault(); zoom *= (e.deltaY > 0 ? 0.9 : 1.1); draw(); }, {passive:false});
    window.addEventListener('keydown', (e) => {
        if(e.key.toLowerCase() === 'h') { isHDown = true; canvas.classList.add('grab-cursor'); }
        if(e.key.toLowerCase() === 'z') document.getElementById('btnUndo').click();
    });
    window.addEventListener('keyup', (e) => { if(e.key.toLowerCase() === 'h') { isHDown = false; canvas.classList.remove('grab-cursor'); } });
</script>
</body>
</html>
