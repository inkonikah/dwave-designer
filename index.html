<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자재 산출 특화 프리드로잉 툴</title>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; background-color: #2c3e50; }
        #sidebar { width: 360px; background: #fff; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.2); z-index: 10; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; cursor: crosshair; }
        canvas { display: block; background-color: #f8f9fa; }
        /* 그리드 배경 (프리드로잉 시 공간감 부여) */
        canvas.grid-bg { background-image: linear-gradient(#e9ecef 1px, transparent 1px), linear-gradient(90deg, #e9ecef 1px, transparent 1px); background-size: 20px 20px; }
        h2, h3 { margin: 0; font-size: 16px; color: #333; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 13px; font-weight: bold; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 5px; }
        button { padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 13px; }
        button:hover { background-color: #0056b3; }
        button.active { background-color: #dc3545; }
        button.success { background-color: #28a745; }
        button.success:hover { background-color: #218838; }
        button.secondary { background-color: #6c757d; }
        button.secondary:hover { background-color: #5a6268; }
        .btn-row { display: flex; gap: 5px; }
        .btn-row button { flex: 1; }
        .result-box { background: #f4f6f9; padding: 15px; border-radius: 6px; border: 1px solid #dce1e6; font-size: 14px; line-height: 1.6; }
        hr { border: 0; border-top: 1px solid #ddd; margin: 5px 0; }
        .shortcut-info { font-size: 12px; color: #555; background: #eee; padding: 10px; border-radius: 4px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>📏 자재 산출 특화 툴 (프리드로잉)</h2>
    
    <div class="form-group">
        <label>1. 도면 불러오기 (선택사항, 없으면 빈 화면)</label>
        <input type="file" id="imageLoader" accept="image/*">
    </div>

    <div class="form-group">
        <button id="btnCalibrate">2. 척도 설정 (실제 길이 지정)</button>
        <span id="scaleStatus" style="font-size: 12px; color: red; font-weight: bold;">척도 미설정 (임시: 1px = 10mm)</span>
    </div>

    <hr>

    <div class="form-group">
        <label>3. 폴리라인 (벽체) 그리기</label>
        <div class="btn-row">
            <button id="btnDraw">선 그리기</button>
            <button id="btnFinish" class="success">그리기 완료</button>
        </div>
        <div class="btn-row" style="margin-top: 5px;">
            <button id="btnUndo" class="secondary">되돌리기(Undo)</button>
            <button id="btnClear" class="secondary">전체 초기화</button>
        </div>
    </div>

    <hr>
    <h3>📦 자재 물량 설정</h3>
    <div class="form-group">
        <label>벽 높이 (mm)</label>
        <input type="number" id="wallHeight" value="2400" step="100">
    </div>

    <div class="form-group">
        <label>기본 골조 (뼈대)</label>
        <select id="baseWallType">
            <option value="none">없음 (기존 벽체 활용)</option>
            <option value="alc75">ALC 블록 75T</option>
            <option value="alc100">ALC 블록 100T</option>
            <option value="stud">목상 (투바이포 2x4)</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>마감재 및 충진재 (중복 선택 가능)</label>
        <div class="checkbox-group">
            <input type="checkbox" id="chkGypsum95" checked> <label for="chkGypsum95">일반 석고 9.5T (3x6)</label>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="chkGypsum125"> <label for="chkGypsum125">차음 석고 12.5T (3x6)</label>
        </div>
        <div class="checkbox-group" style="margin-top: 5px;">
            <select id="insulationType">
                <option value="none">충진재 없음</option>
                <option value="glasswool">글라스울 (450x1000)</option>
                <option value="rockwool">락울 (450x1000)</option>
            </select>
        </div>
    </div>

    <hr>
    <h3>📊 물량 산출 결과</h3>
    <div id="results" class="result-box">
        선을 그리고 완료를 눌러주세요.
    </div>

    <div class="shortcut-info">
        <strong>[조작 단축키]</strong><br>
        • 화면 이동: <b>H 키 누르고 마우스 드래그</b><br>
        • 확대/축소: <b>마우스 휠</b><br>
        • 직교 선긋기: <b>Shift 키 누르고 클릭</b><br>
        • 실행 취소: <b>Ctrl + Z</b>
    </div>
</div>

<div id="canvas-container">
    <canvas id="canvas" class="grid-bg"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');

    // UI 버튼 및 입력창
    const imageLoader = document.getElementById('imageLoader');
    const btnCalibrate = document.getElementById('btnCalibrate');
    const btnDraw = document.getElementById('btnDraw');
    const btnFinish = document.getElementById('btnFinish');
    const btnUndo = document.getElementById('btnUndo');
    const btnClear = document.getElementById('btnClear');
    const scaleStatus = document.getElementById('scaleStatus');
    const resultsDiv = document.getElementById('results');

    // 자재 변수
    const wallHeightInput = document.getElementById('wallHeight');
    const baseWallType = document.getElementById('baseWallType');
    const chkGypsum95 = document.getElementById('chkGypsum95');
    const chkGypsum125 = document.getElementById('chkGypsum125');
    const insulationType = document.getElementById('insulationType');

    // 상태 변수
    let image = null;
    let mode = 'idle'; // 'idle', 'calibrate', 'draw'
    let points = [];
    let calibPoints = [];
    let isClosed = false;
    let scale = 10; // 기본값: 1픽셀 = 10mm (프리드로잉용 임시)
    let isScaleSet = false;

    // 화면 컨트롤 변수
    let panX = 0, panY = 0;
    let zoom = 1;
    let isHDown = false;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let isShiftDown = false;
    let mouseX = 0, mouseY = 0;

    // 캔버스 사이즈 맞춤
    function resizeCanvas() {
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        if(!image && panX === 0 && panY === 0) {
            // 프리드로잉 시 초기 화면 중앙 정렬
            panX = canvas.width / 2;
            panY = canvas.height / 2;
        }
        draw();
    }
    window.addEventListener('resize', resizeCanvas);

    // 이미지 로드 (도면 있을 때)
    imageLoader.addEventListener('change', (e) => {
        if (!e.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            image = new Image();
            image.onload = () => {
                canvas.classList.remove('grid-bg'); // 도면 있으면 그리드 제거
                zoom = Math.min(canvas.width / image.width, canvas.height / image.height) * 0.9;
                panX = (canvas.width - image.width * zoom) / 2;
                panY = (canvas.height - image.height * zoom) / 2;
                draw();
            }
            image.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    // 키보드 이벤트 (H키 화면이동, Shift 직교, Ctrl+Z Undo)
    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'h') {
            isHDown = true;
            canvas.style.cursor = 'grab';
        }
        if (e.key === 'Shift') isShiftDown = true;
        if (e.ctrlKey && e.key.toLowerCase() === 'z') doUndo();
    });

    window.addEventListener('keyup', (e) => {
        if (e.key.toLowerCase() === 'h') {
            isHDown = false;
            isDragging = false;
            canvas.style.cursor = mode === 'draw' || mode === 'calibrate' ? 'crosshair' : 'default';
        }
        if (e.key === 'Shift') isShiftDown = false;
    });

    // 마우스 이벤트
    canvas.addEventListener('mousedown', (e) => {
        // H키 누르거나 휠 버튼(버튼 1) 클릭 시 화면 이동
        if (isHDown || e.button === 1) {
            isDragging = true;
            dragStartX = e.clientX - panX;
            dragStartY = e.clientY - panY;
            canvas.style.cursor = 'grabbing';
            return;
        }

        if (mode === 'idle') return;

        const rect = canvas.getBoundingClientRect();
        let x = (e.clientX - rect.left - panX) / zoom;
        let y = (e.clientY - rect.top - panY) / zoom;

        // 직교 모드 보정
        if (isShiftDown && points.length > 0 && mode === 'draw') {
            const last = points[points.length - 1];
            if (Math.abs(x - last.x) > Math.abs(y - last.y)) y = last.y;
            else x = last.x;
        }

        if (mode === 'calibrate') {
            calibPoints.push({x, y});
            if (calibPoints.length === 2) {
                let pxDist = Math.hypot(calibPoints[1].x - calibPoints[0].x, calibPoints[1].y - calibPoints[0].y);
                let actual = prompt("그으신 선의 실제 길이는 몇 mm 입니까?");
                if (actual && !isNaN(actual)) {
                    scale = parseFloat(actual) / pxDist;
                    isScaleSet = true;
                    scaleStatus.textContent = `척도 고정됨 (1px = ${scale.toFixed(2)}mm)`;
                    scaleStatus.style.color = "blue";
                }
                mode = 'idle';
                calibPoints = [];
                btnCalibrate.classList.remove('active');
                updateResults();
            }
        } else if (mode === 'draw' && !isClosed) {
            // 시작점과 가까우면 도형 닫기 (스냅)
            if (points.length > 2) {
                const dist = Math.hypot(x - points[0].x, y - points[0].y) * zoom;
                if (dist < 15) {
                    isClosed = true;
                    updateResults();
                    draw();
                    return;
                }
            }
            points.push({x, y});
            updateResults();
        }
        draw();
    });

    canvas.addEventListener('mousemove', (e) => {
        if (isDragging) {
            panX = e.clientX - dragStartX;
            panY = e.clientY - dragStartY;
            draw();
            return;
        }

        const rect = canvas.getBoundingClientRect();
        let x = (e.clientX - rect.left - panX) / zoom;
        let y = (e.clientY - rect.top - panY) / zoom;

        if (isShiftDown && points.length > 0 && mode === 'draw') {
            const last = points[points.length - 1];
            if (Math.abs(x - last.x) > Math.abs(y - last.y)) y = last.y;
            else x = last.x;
        }

        mouseX = x;
        mouseY = y;
        draw();
    });

    canvas.addEventListener('mouseup', () => { 
        isDragging = false; 
        if(isHDown) canvas.style.cursor = 'grab';
    });
    
    // 휠 줌
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        const wheel = e.deltaY < 0 ? 1 : -1;
        let newZoom = zoom * Math.exp(wheel * 0.15);
        if (newZoom < 0.05) newZoom = 0.05;
        if (newZoom > 20) newZoom = 20;

        panX = mx - (mx - panX) * (newZoom / zoom);
        panY = my - (my - panY) * (newZoom / zoom);
        zoom = newZoom;
        
        draw();
    }, { passive: false });

    // 버튼 이벤트
    btnCalibrate.addEventListener('click', () => {
        mode = 'calibrate';
        calibPoints = [];
        btnCalibrate.classList.add('active');
        btnDraw.classList.remove('active');
        canvas.style.cursor = 'crosshair';
    });

    btnDraw.addEventListener('click', () => {
        mode = 'draw';
        isClosed = false;
        btnDraw.classList.add('active');
        btnCalibrate.classList.remove('active');
        canvas.style.cursor = 'crosshair';
    });

    btnFinish.addEventListener('click', () => {
        if (mode === 'draw') {
            mode = 'idle';
            btnDraw.classList.remove('active');
            updateResults();
            draw();
        }
    });

    btnUndo.addEventListener('click', doUndo);

    function doUndo() {
        if (points.length > 0) {
            if (isClosed) {
                isClosed = false; // 닫힌거 열기
            } else {
                points.pop(); // 점 하나 빼기
            }
            updateResults();
            draw();
        }
    }

    btnClear.addEventListener('click', () => {
        points = [];
        calibPoints = [];
        isClosed = false;
        mode = 'idle';
        btnDraw.classList.remove('active');
        btnCalibrate.classList.remove('active');
        resultsDiv.innerHTML = "선을 그리고 완료를 눌러주세요.";
        draw();
    });

    // 옵션 변경 시 즉시 재계산
    [wallHeightInput, baseWallType, chkGypsum95, chkGypsum125, insulationType].forEach(el => {
        el.addEventListener('change', updateResults);
    });

    // 그리기 함수
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(panX, panY);
        ctx.scale(zoom, zoom);

        if (image) ctx.drawImage(image, 0, 0);

        // 척도 설정 선
        if (calibPoints.length > 0) {
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 2 / zoom;
            ctx.beginPath();
            ctx.arc(calibPoints[0].x, calibPoints[0].y, 4/zoom, 0, Math.PI*2);
            ctx.fillStyle = '#ff0000';
            ctx.fill();

            if (mode === 'calibrate' && calibPoints.length === 1) {
                ctx.moveTo(calibPoints[0].x, calibPoints[0].y);
                ctx.lineTo(mouseX, mouseY);
                ctx.stroke();
            }
        }

        // 폴리라인 그리기
        if (points.length > 0) {
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 4 / zoom;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            
            if (isClosed) {
                ctx.lineTo(points[0].x, points[0].y);
                ctx.fillStyle = 'rgba(0, 123, 255, 0.15)';
                ctx.fill();
            } else if (mode === 'draw') {
                // 마우스 따라다니는 임시 선
                ctx.lineTo(mouseX, mouseY);
            }
            ctx.stroke();

            // 꼭지점 마커
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2 / zoom;
            for (let pt of points) {
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 5 / zoom, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }
        }

        ctx.restore();
    }

    // 자재 물량 산출 코어 로직
    function updateResults() {
        if (points.length < 1) {
            resultsDiv.innerHTML = "선을 그리고 완료를 눌러주세요.";
            return;
        }

        let totalLenMm = 0;
        for (let i = 0; i < points.length - 1; i++) {
            totalLenMm += Math.hypot(points[i+1].x - points[i].x, points[i+1].y - points[i].y) * scale;
        }
        if (isClosed && points.length > 2) {
            totalLenMm += Math.hypot(points[0].x - points[points.length-1].x, points[0].y - points[points.length-1].y) * scale;
        }

        let areaSqMm = 0;
        if (isClosed && points.length > 2) {
            let s1 = 0, s2 = 0;
            for (let i = 0; i < points.length; i++) {
                let j = (i + 1) % points.length;
                s1 += (points[i].x * scale) * (points[j].y * scale);
                s2 += (points[j].x * scale) * (points[i].y * scale);
            }
            areaSqMm = Math.abs(s1 - s2) / 2;
        }

        let lenM = (totalLenMm / 1000).toFixed(2);
        let html = `<strong>총 벽체 길이:</strong> ${lenM} m<br>`;
        
        if (isClosed && points.length > 2) {
            let areaSqM = (areaSqMm / 1000000).toFixed(2);
            let pyeong = (areaSqM * 0.3025).toFixed(2);
            html += `<strong>바닥 면적:</strong> ${areaSqM} ㎡ (${pyeong} 평)<br>`;
        }
        
        html += `<hr><strong>[자재 소요량 산출]</strong><br>`;
        let hMm = parseFloat(wallHeightInput.value) || 2400;
        let wallAreaM2 = (totalLenMm / 1000) * (hMm / 1000); 
        
        const gypArea = 1.62; // 3x6 사이즈
        const insArea = 0.45; // 450x1000 사이즈
        const alcArea = 0.18; // 600x300 사이즈

        let baseType = baseWallType.value;
        if (baseType === 'alc75') {
            let c = Math.ceil(wallAreaM2 / alcArea);
            html += `• ALC 75T: <b>${c}</b> 장<br>`;
        } else if (baseType === 'alc100') {
            let c = Math.ceil(wallAreaM2 / alcArea);
            html += `• ALC 100T: <b>${c}</b> 장<br>`;
        } else if (baseType === 'stud') {
            // 위아래 런너 + 450간격 스터드
            let studLenMm = (totalLenMm * 2) + ((Math.ceil(totalLenMm / 450) + points.length) * hMm);
            let c = Math.ceil(studLenMm / 3600);
            html += `• 투바이포(3.6m): <b>${c}</b> 개<br>`;
        }

        if (chkGypsum95.checked) {
            let c = Math.ceil(wallAreaM2 / gypArea);
            html += `• 일반 석고 9.5T: <b>${c}</b> 장<br>`;
        }
        if (chkGypsum125.checked) {
            let c = Math.ceil(wallAreaM2 / gypArea);
            html += `• 차음 석고 12.5T: <b>${c}</b> 장<br>`;
        }

        let ins = insulationType.value;
        if (ins !== 'none') {
            let name = ins === 'glasswool' ? '글라스울' : '락울';
            let c = Math.ceil(wallAreaM2 / insArea);
            html += `• ${name}: <b>${c}</b> 매<br>`;
        }

        if (!isScaleSet) {
            html += `<br><span style="color:#dc3545; font-size:12px;">※ 현재 척도가 고정되지 않았습니다. (임시비율 적용중) 먼저 <b>척도 설정</b>을 해주세요.</span>`;
        }

        resultsDiv.innerHTML = html;
    }

    // 시작
    resizeCanvas();
    setTimeout(resizeCanvas, 100); // 폰트/레이아웃 로딩 후 재조정
</script>
</body>
</html>
