<!DOCTYPE html>
<html>
<head>
    <title>DWave Designer v23.0 - Scale & Guide</title>
    <style>
        :root { --bg: #1e1e1e; --accent: #27ae60; }
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; display: flex; height: 100vh; background: #121212; color: #fff; overflow: hidden; }
        
        /* 작업창 */
        .canvas-area { flex: 1; position: relative; background: #333; overflow: hidden; }
        canvas { background: #fff; transform-origin: 0 0; cursor: crosshair; }

        /* 도구함 */
        .tool-bar { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; z-index: 100; border: 1px solid #444; width: 300px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 8px; color: #fff; font-size: 14px; }
        
        /* 오른쪽 리포트 */
        .sidebar { width: 400px; background: #f8f9fa; color: #333; padding: 25px; overflow-y: auto; border-left: 2px solid #444; }
        .room-card { background: #fff; border-radius: 12px; padding: 15px; margin-bottom: 20px; border-left: 10px solid #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .val { color: #c0392b; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="tool-bar">
    <h3 style="margin:0 0 15px 0; color:#3498db;">DWave Pro v23.0</h3>
    <input type="file" id="up" style="margin-bottom:15px; color:#fff; font-size:12px;">
    
    <button class="btn" style="background:#f1c40f; color:#000;" onclick="setMode('scale')">📏 1단계: 도면 1m 지점 긋기</button>
    <button class="btn" style="background:#27ae60;" onclick="setMode('room')">🏠 2단계: 방 그리기</button>
    <button class="btn" style="background:#e74c3c;" onclick="resetAll()">🧼 초기화</button>
    
    <div id="status" style="font-size:12px; color:#aaa; margin-top:10px; line-height:1.6;">
        현재 모드: <b id="modeTxt" style="color:#fff;">방 그리기</b><br>
        * 휠: 줌 | 우클릭: 이동
    </div>
</div>

<div class="canvas-area">
    <canvas id="cvs"></canvas>
</div>

<div class="sidebar">
    <h2 style="margin-top:0;">실시간 산출</h2>
    <div id="roomContainer">
        <p style="color:#999;">도면을 올리고 척도를 먼저 맞춘 뒤<br>방 영역을 그려주세요.</p>
    </div>
</div>

<script>
    const cvs = document.getElementById('cvs');
    const ctx = cvs.getContext('2d');
    let img = new Image(), rooms = [], mode = 'room', isDown = false;
    let scalePxM = 100, zoom = 1, offX = 0, offY = 0;
    let sx, sy;

    document.getElementById('up').onchange = (e) => {
        const r = new FileReader();
        r.onload = (v) => { img.onload = () => { cvs.width = img.width; cvs.height = img.height; update(); }; img.src = v.target.result; };
        r.readAsDataURL(e.target.files[0]);
    };

    // 줌/팬
    window.addEventListener('wheel', (e) => { zoom *= (e.deltaY > 0 ? 0.9 : 1.1); update(); }, {passive: false});
    cvs.oncontextmenu = (e) => e.preventDefault();
    
    cvs.onmousedown = (e) => {
        const mx = (e.offsetX - offX) / zoom;
        const my = (e.offsetY - offY) / zoom;
        if(e.button === 0) { isDown = true; sx = mx; sy = my; }
    };

    window.onmousemove = (e) => {
        const mx = (e.offsetX - offX) / zoom;
        const my = (e.offsetY - offY) / zoom;
        
        if (isDown) {
            update();
            ctx.setTransform(zoom, 0, 0, zoom, offX, offY);
            if(mode === 'scale') {
                ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 4/zoom;
                ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(mx, my); ctx.stroke();
            } else {
                ctx.strokeStyle = '#3498db'; ctx.lineWidth = 2/zoom;
                ctx.strokeRect(sx, sy, mx - sx, my - sy);
                // 실시간 치수 가이드 표시
                const wM = Math.abs(mx - sx) / scalePxM;
                const dM = Math.abs(my - sy) / scalePxM;
                ctx.fillStyle = "#3498db"; ctx.font = `bold ${16/zoom}px Arial`;
                ctx.fillText(`${wM.toFixed(2)}m x ${dM.toFixed(2)}m`, sx, sy - 10/zoom);
            }
        }
        if (e.buttons === 2) { offX += e.movementX; offY += e.movementY; update(); }
    };

    window.onmouseup = (e) => {
        if (!isDown) return; isDown = false;
        const ex = (e.offsetX - offX) / zoom;
        const ey = (e.offsetY - offY) / zoom;
        const dist = Math.sqrt(Math.pow(ex-sx, 2) + Math.pow(ey-sy, 2));

        if(mode === 'scale') {
            const m = prompt("방금 그은 선의 실제 길이는 몇 m인가요? (도면 치수 확인)", "1");
            if(m) scalePxM = dist / parseFloat(m);
        } else {
            const wM = Math.abs(ex - sx) / scalePxM;
            const dM = Math.abs(ey - sy) / scalePxM;
            if(wM > 0.1) rooms.push({ id: Date.now(), sx, sy, w: ex-sx, d: ey-sy, rw: wM, rd: dM });
        }
        update();
    };

    function setMode(m) { mode = m; document.getElementById('modeTxt').innerText = m === 'scale' ? "척도 설정 중..." : "방 그리기"; }
    function resetAll() { rooms = []; update(); }

    function update() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, cvs.width, cvs.height);
        ctx.setTransform(zoom, 0, 0, zoom, offX, offY);
        if(img.src) ctx.drawImage(img, 0, 0);
        
        rooms.forEach(r => {
            ctx.strokeStyle = '#27ae60'; ctx.lineWidth = 3/zoom;
            ctx.strokeRect(r.sx, r.sy, r.w, r.d);
            ctx.fillStyle = 'rgba(39, 174, 96, 0.15)'; ctx.fillRect(r.sx, r.sy, r.w, r.d);
            ctx.fillStyle = '#000'; ctx.font = `bold ${14/zoom}px Arial`;
            ctx.fillText(`${r.rw.toFixed(2)}m x ${r.rd.toFixed(2)}m`, r.sx + 5/zoom, r.sy + 18/zoom);
        });

        const container = document.getElementById('roomContainer');
        container.innerHTML = "";
        rooms.forEach((r, i) => {
            const peri = (r.rw + r.rd) * 2;
            const area = peri * 2.7;
            const div = document.createElement('div');
            div.className = 'room-card';
            div.innerHTML = `
                <b>방 #${i+1} (${r.rw.toFixed(2)}m x ${r.rd.toFixed(2)}m)</b><br>
                둘레: ${peri.toFixed(2)}m / 면적: ${area.toFixed(1)}㎡<br>
                ALC(더블): <span class="val">${Math.ceil(area/0.24*2*1.1)}장</span> / 석고: <span class="val">${Math.ceil(area/1.62*4*1.1)}매</span>
            `;
            container.appendChild(div);
        });
    }
</script>
</body>
</html>
